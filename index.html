  :root {
    --forest: #A07540;
    --forest-mid: #1a7abf;
    --forest-light: #5aaee0;
    --sand: #f5f0e8;
    --sand-dark: #e8e0d0;
    --gold: #c9a84c;
    --gold-light: #f0d890;
    --text-dark: #1c1c1c;
    --text-mid: #5a5a5a;
    --text-light: #9a9a9a;
    --white: #ffffff;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--text-dark); min-height: 100vh; overflow-x: hidden; }

  /* ── HERO ── */
  .hero { background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABaAAAADICAIAAACRXdEPAAAFeUlEQVR4nO3dQQ3DQBAEwYu1XEI7EMJwDcIPq6UqBH6f2rOf7+9/AAAAAMpmd9/+BgAAAIBH5njgAAAAAOKutz8AAAAA4CkFBwAAAJCn4AAAAADyFBwAAABA3njeAAAAAOoUHAAAAECeDQ4AAAAgT8EBAAAA5Ck4AAAAgDwFBwAAAJDnigoAAACQp+AAAAAA8mxwAAAAAHkKDgAAACBPwQEAAADkKTgAAACAPFdUAAAAgDwFBwAAAJBngwMAAADIU3AAAAAAeQoOAAAAIE/BAQAAAOS5ogIAAADkKTgAAACAPBscAAAAQJ6CAwAAAMhTcAAAAAB5Cg4AAAAgT8EBAAAA5M0qOAAAAIA4BQcAAACQZ4MDAAAAyFNwAAAAAHkKDgAAACBPwQEAAADkuaICAAAA5Ck4AAAAgDwbHAAAAECeggMAAADIU3AAAAAAeQoOAAAAIM8VFQAAACBPwQEAAADk2eAAAAAA8hQcAAAAQJ6CAwAAAMhTcAAAAAB5rqgAAAAAeQoOAAAAIM8GBwAAAJCn4AAAAADyFBwAAABAnoIDAAAAyHNFBQAAAMhTcAAAAAB5NjgAAACAPAUHAAAAkKfgAAAAAPIUHAAAAECeggMAAADIG88bAAAAQJ2CAwAAAMizwQEAAADkKTgAAACAvDneNwAAAIC4OV44AAAAgLjxhwoAAABQp+AAAAAA8mxwAAAAAHkKDgAAACBPwQEAAADkKTgAAACAPFdUAAAAgDwFBwAAAJBngwMAAADIU3AAAAAAeQoOAAAAIE/BAQAAAOS5ogIAAADkKTgAAACAPBscAAAAQJ6CAwAAAMhTcAAAAAB5Cg4AAAAgT8EBAAAA5M164QAAAADiFBwAAABAng0OAAAAIE/BAQAAAOQpOAAAAIA8BQcAAACQ54oKAAAAkKfgAAAAAPJscAAAAAB5Cg4AAAAgT8EBAAAA5Ck4AAAAgDxXVAAAAIA8BQcAAACQZ4MDAAAAyFNwAAAAAHkKDgAAACBPwQEAAADkuaICAAAA5Ck4AAAAgDwbHAAAAECeggMAAADIU3AAAAAAeQoOAAAAIM8VFQAAACBPwQEAAADk2eAAAAAA8hQcAAAAQJ6CAwAAAMhTcAAAAAB5Cg4AAAAgb9b7BgAAABCn4AAAAADybHAAAAAAeQoOAAAAIE/BAQAAAOQpOAAAAIA8V1QAAACAPAUHAAAAkGeDAwAAAMhTcAAAAAB5Cg4AAAAgT8EBAAAA5LmiAgAAAOQpOAAAAIA8GxwAAABA3hz/qAAAAABx19sfAAAAAPCUggMAAADIG88bAAAAQJ2CAwAAAMizwQEAAADkKTgAAACAPAUHAAAAkKfgAAAAAPIUHAAAAEDerIIDAAAAiFNwAAAAAHk2OAAAAIA8BQcAAACQp+AAAAAA8hQcAAAAQJ4rKgAAAECeggMAAADIs8EBAAAA5Ck4AAAAgDwFBwAAAJCn4AAAAADyXFEBAAAA8hQcAAAAQJ4NDgAAACBPwQEAAADkKTgAAACAPAUHAAAAkOeKCgAAAJCn4AAAAADybHAAAAAAeQoOAAAAIE/BAQAAAOQpOAAAAIA8V1QAAACAPAUHAAAAkGeDAwAAAMhTcAAAAAB5Cg4AAAAgT8EBAAAA5Ck4AAAAgLzxvAEAAADUKTgAAACAPBscAAAAQJ6CAwAAAMhTcAAAAAB5Cg4AAAAgzxUVAAAAIE/BAQAAAOTZ4AAAAADyFBwAAABAnoIDAAAAyFNwAAAAAHmuqAAAAAB5Cg4AAAAgzwYHAAAAkKfgAAAAAPIUHAAAAECeggMAAADIc0UFAAAAyFNwAAAAAHk2OAAAAIA8BQcAAACQp+AAAAAA8hQcAAAAQJ6CAwAAAMi7ARM67D4BjWgaAAAAAElFTkSuQmCC'); background-size: cover; background-position: center; padding: 1.5rem 1.5rem 0; position: relative; overflow: hidden; }
  .hero::before { display: none; }

  .hero-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; position: relative; }
  .hero-tagline { flex: 1; }
  .hero-tagline-text { font-family: 'Rotana', serif; font-size: clamp(13px, 2.5vw, 32px); font-weight: 400; color: var(--white); line-height: 1.3; letter-spacing: -0.3px; }
  .font-rotana { font-family: 'Rotana', serif; font-weight: normal; }
  .font-minerva-it { font-family: 'Rotana', serif; color: var(--white); font-style: normal; }
  .hero-tagline-text em { font-style: normal; color: var(--white); }
  .hero-tagline-sub { font-family: Arial, sans-serif;
    font-size: clamp(11px, 1.5vw, 14px);
    color: rgba(255,255,255,.6);
    margin-top: 4px;
    letter-spacing: .3px;
  }
  .hero-logo-wrap { flex-shrink: 0; margin-left: 1.5rem; }
  .hero-logo-wrap a { display: block; }
  .hero-logo-wrap img { height: clamp(50px, 8vw, 80px); width: auto; object-fit: contain; display: block; }

  /* ── TABS ── */
  .tabs-wrap { overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; position: relative; }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs { display: flex; min-width: max-content; border-top: 1px solid rgba(255,255,255,.1); }
  .tab {
    padding: .75rem 1.25rem;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: rgba(255,255,255,.5);
    border: none;
    background: transparent;
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: color .2s, border-color .2s;
    white-space: nowrap;
    letter-spacing: .2px;
  }
  .tab:hover { color: rgba(255,255,255,.8); }
  .tab.active { color: #ffffff; border-bottom-color: #0F5F73; font-weight: 500; }

  /* ── CONTENT ── */
  .content { padding: 1.5rem 1.25rem 5rem; max-width: 900px; margin: 0 auto; }
  .section { display: none; animation: fadeUp .3s ease; }
  .section.active { display: block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .sec-head { font-family: 'MinervaModernBd', serif; font-size: clamp(24px, 3vw, 32px); font-weight: 500; color: #073B4C; margin-bottom: 1.25rem; margin-top: .25rem; }
  .sec-head span { color: var(--gold); font-style: italic; }

  /* ── CARD GRID (desktop) ── */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }

  .card { background: var(--white); border-radius: var(--radius); padding: 1.1rem 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04); transition: box-shadow .2s, transform .2s; }
  .card.clickable { cursor: pointer; text-decoration: none; display: block; color: inherit; }
  .card.clickable:hover { box-shadow: 0 4px 20px rgba(14,90,146,.18); transform: translateY(-2px); }
  .card-name { font-family: 'MinervaModernRg', serif; font-size: 19px; font-weight: 600; color: #0F5F73; }
  .card-name-link { display: flex; align-items: center; gap: 6px; }
  .card-name-link .ext-icon { font-size: 12px; opacity: .5; }
  .card-type { font-family: Arial, sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-light); margin-top: 2px; margin-bottom: .75rem; }
  .pill { font-size: 10.5px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .pill-gold { background: #faf0d0; color: #8a6200; }
  .pill-green { background: #e0f2ea; color: #1a5c38; }
  .pill-blue  { background: #e6f0fb; color: #1a4580; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .75rem; }

  .time-rows { border-top: 1px solid var(--sand-dark); padding-top: .625rem; }
  .time-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid rgba(0,0,0,.05); gap: 1rem; }

  <button class="nav-btn" onclick="show('matches',6)"><span class="nav-icon">⚽</span><div class="nav-dot"></div><span class="nav-label">Match</span></button>
</div>

<script>
const SHEET_ID = '1uLpxkT-yZpIpqgVrihxN_LdXbYeKbrbrMnm8CNBUmyA';

const SHEET_TABS = {
  dining:        'Dining',
  offers:        'Offers',
  packages:      'Packages',
  activities:    'Activities',
  entertainment: 'Entertainment',
  resort:        'Resort',
  matches:       'Catch the Match'
};

function show(id, idx) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i === idx));
  const activeTab = document.querySelectorAll('.tab')[idx];
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  window.scrollTo({top:0, behavior:'smooth'});
}

function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) return [];

  // Auto-detect instruction rows: if row 0 has far fewer non-empty columns than row 1,
  // treat row 1 as the real header (handles "📋 DINING SCHEDULE..." type instruction rows)
  function countCols(line) {
    return line.split(',').filter(v => v.replace(/^"|"$/g, '').trim()).length;
  }
  let headerIdx = 0;
  if (lines.length > 1 && countCols(lines[1]) > countCols(lines[0]) + 1) headerIdx = 1;

  const headers = lines[headerIdx].split(',').map(h => h.replace(/^"|"$/g, '').trim());

  return lines.slice(headerIdx + 1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { if (h) obj[h] = (vals[i] || '').replace(/^"|"$/g, ''); });
    return obj;
  });
}

async function fetchSheet(tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  if (text.includes('Sign in') || text.includes('<html')) throw new Error('Sheet not public');
  return parseCSV(text);
}

function renderDining(rows) {
  // Columns: Restaurant | Status | Meal Period | Time | Description | AI | UAI
  // Fill down Restaurant and Status
  var lastRest = '', lastStatus = 'Open';
  rows = rows.map(function(r) {
    var rest   = (r['Restaurant'] || '').trim();
    var status = (r['Status'] || '').trim();
    if (rest)   lastRest   = rest;
    if (status) lastStatus = status;
    return {
      rest:   lastRest,
      status: lastStatus,
      meal:   (r['Meal Period / Service'] || r['Meal Period'] || '').trim(),
      time:   (r['Timing'] || r['Time'] || '').trim(),
      notes:  (r['Notes'] || r['Description'] || '').trim()
    };
  });

  // Filter: remove closed, empty, and placeholder rows
  rows = rows.filter(function(r) {
    return r.rest && r.meal
      && r.status.toUpperCase() !== 'CLOSED'
      && r.meal.indexOf('add details') === -1;
  });

  // Group by restaurant
  var groups = {}, order = [];
  rows.forEach(function(r) {
    if (!groups[r.rest]) { groups[r.rest] = []; order.push(r.rest); }
    groups[r.rest].push(r);
  });

  if (!order.length) return '<div class="sec-head">Dining &amp; Bars</div><div class="error-box"><div class="error-sub">No outlets currently open.</div></div>';

  var LINKS = {
    'Basilico':    'https://www.rotana.com/rotanahotelandresorts/unitedarabemirates/rasalkhaimah/thecoverotanaresort/diningout/basilicomediterraneanrestaurant',
    'Cinnamon':    'https://www.rotana.com/rotanahotelandresorts/unitedarabemirates/rasalkhaimah/thecoverotanaresort/dining',
    'Breeze':      'https://www.rotana.com/rotanahotelandresorts/unitedarabemirates/rasalkhaimah/thecoverotanaresort/dining',
    'Breakers':    'https://www.rotana.com/rotanahotelandresorts/unitedarabemirates/rasalkhaimah/thecoverotanaresort/dining',
    'Sunset Bar':  'https://www.rotana.com/rotanahotelandresorts/unitedarabemirates/rasalkhaimah/thecoverotanaresort/dining',
    'Laguna Bay':  'https://www.rotana.com/rotanahotelandresorts/unitedarabemirates/rasalkhaimah/thecoverotanaresort/dining',
    'The Lounge':  'https://www.rotana.com/rotanahotelandresorts/unitedarabemirates/rasalkhaimah/thecoverotanaresort/dining',
    'Veranda':     'https://www.rotana.com/rotanahotelandresorts/unitedarabemirates/rasalkhaimah/thecoverotanaresort/dining',
    'The Swing':   'https://www.rotana.com/rotanahotelandresorts/unitedarabemirates/rasalkhaimah/thecoverotanaresort/dining',
    'Chit Chat':   'https://www.rotana.com/rotanahotelandresorts/unitedarabemirates/rasalkhaimah/thecoverotanaresort/dining',
    'Room Service':'https://www.rotana.com/rotanahotelandresorts/unitedarabemirates/rasalkhaimah/thecoverotanaresort/dining'
  };

  var cards = order.map(function(name) {
    var items = groups[name];
    var link  = LINKS[name] || '';
    var tag   = link ? 'a class="card clickable" href="' + link + '" target="_blank" rel="noopener"' : 'div class="card"';
    var close = link ? 'a' : 'div';
    var arrow = link ? '<span class="ext-icon">↗</span>' : '';

    var timeRows = items.map(function(r) {
      var note = r.notes ? '<span class="time-note"> — ' + r.notes + '</span>' : '';
      return '<div class="time-row">'
        + '<span class="time-label">' + r.meal + '</span>'
        + '<span class="time-val">' + r.time + note + '</span>'
        + '</div>';
    }).join('');

    return '<' + tag + '>'
      + '<div class="card-header"><div>'
      + '<div class="card-name card-name-link">' + name + arrow + '</div>'
      + '</div></div>'
      + '<div class="time-rows">' + timeRows + '</div>'
      + '</' + close + '>';
  }).join('');

  return '<div class="sec-head">Dining &amp; Bars</div><div class="card-grid">' + cards + '</div>';
}

function renderOffers(rows) {
  var offerRows = rows.filter(function(r) { return r.Title && r.Title.trim(); });
  if (!offerRows.length) return '<div class="sec-head">Exclusive Offers</div><div class="error-box"><div class="error-sub">No offers available at this time.</div></div>';
  return '<div class="sec-head">Exclusive Offers</div>'
    + offerRows.map(function(r) {
        var link = (r.Link || '').trim();
        var tag  = link ? 'a class="offer-card offer-card-link" href="' + link + '" target="_blank" rel="noopener"' : 'div class="offer-card"';
        var closeTag = link ? 'a' : 'div';
        var arrow = link ? '<div class="offer-arrow">&#8599;</div>' : '';
        return '<' + tag + '>'
          + '<div class="offer-icon">' + (r.Icon || '🎁') + '</div>'
          + '<div style="flex:1">'
          + '<div class="offer-title">' + r.Title + '</div>'
          + '<div class="offer-detail">' + (r.Detail || '') + '</div>'
          + (r.Time  ? '<div class="offer-detail" style="margin-top:4px">' + r.Time + '</div>' : '')
          + (r.Price ? '<span class="offer-price">' + r.Price + '</span>' : '')
          + '</div>'
          + arrow
          + '</' + closeTag + '>';
      }).join('');
}

function renderPackages(rows) {
  // Fill down Restaurant and Status
  var lastRest = '', lastStatus = 'Open';
  var statusMap = {};
  rows.forEach(function(r) {
    var rest   = (r['Restaurant'] || '').trim();
    var status = (r['Status'] || '').trim();
    if (rest)   lastRest   = rest;
    if (status) { lastStatus = status; statusMap[lastRest] = status; }
  });

  var closedRestaurants = {};
  Object.keys(statusMap).forEach(function(k) {
    if (statusMap[k].toUpperCase() === 'CLOSED') closedRestaurants[k] = true;
  });

  // Fill down and build data rows
  lastRest = ''; lastStatus = 'Open';
  var dataRows = [];
  rows.forEach(function(r) {
    var rest   = (r['Restaurant'] || '').trim();
    var status = (r['Status'] || '').trim();
    var meal   = (r['Meal Period'] || r['Meal Period / Service'] || '').trim();
    if (rest)   lastRest   = rest;
    if (status) lastStatus = status;
    if (!lastRest || !meal) return;
    if (closedRestaurants[lastRest]) return;
    if (meal.indexOf('add details') !== -1) return;
    dataRows.push({
      rest: lastRest,
      meal: meal,
      time: (r['Time'] || r['Timing'] || '').trim(),
      desc: (r['Description'] || r['Notes'] || '').trim(),
      ai:   (r['AI'] || '').trim(),
      uai:  (r['UAI'] || '').trim()
    });
  });

  // Get Notes rows (bullet points starting with •)
  var infoRows = rows.filter(function(r) {
    return (r['Restaurant'] || '').toString().trim().charAt(0) === '•';
  });

  // Group by restaurant preserving order
  var restaurants = [], seen = {};
  dataRows.forEach(function(r) {
    if (!seen[r.rest]) { seen[r.rest] = true; restaurants.push(r.rest); }
  });

  function renderCell(val) {
    val = (val || '').trim();
    if (!val || val.toUpperCase() === 'FALSE') return '<td class="pkg-cross">—</td>';
    if (val.toUpperCase() === 'TRUE')          return '<td class="pkg-check">✓</td>';
    if (val.toUpperCase() === 'CHARGEABLE')    return '<td class="pkg-charge">CHARGED</td>';
    return '<td class="pkg-custom"><span>' + val + '</span></td>';
  }

  var tableRows = restaurants.map(function(name) {
    var group = dataRows.filter(function(r) { return r.rest === name; });
    var hours = (group[0] && group[0].hours) || '';
    var restRow = '<tr class="pkg-restaurant-row">'
      + '<td class="pkg-col-sticky" style="color:#073B4C"><strong>' + name + '</strong>'
      + (hours ? '<div class="pkg-hours">' + hours + '</div>' : '') + '</td>'
      + '<td colspan="4"></td></tr>';
    var dataHtml = group.map(function(r) {
      return '<tr>'
        + '<td class="pkg-col-sticky pkg-meal">' + r.meal + '</td>'
        + '<td class="pkg-time">' + r.time + '</td>'
        + '<td class="pkg-desc">' + r.desc + '</td>'
        + renderCell(r.ai) + renderCell(r.uai)
        + '</tr>';
    }).join('');
    return restRow + dataHtml;
  }).join('');

  var infoHtml = infoRows.length
    ? '<div class="pkg-info-box"><div class="pkg-info-title">⚠️ Important Information</div>'
      + infoRows.map(function(r) {
          return '<div class="pkg-info-item">' + (r['Restaurant'] || '').trim().replace(/^•\s*/, '') + '</div>';
        }).join('') + '</div>'
    : '';

  if (!restaurants.length) return '<div class="sec-head">Meal Packages</div><div class="error-box"><div class="error-sub">No packages currently available.</div></div>';

  return '<div class="sec-head">Meal Packages</div>'
    + '<div style="background:var(--white);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);margin-bottom:.875rem;overflow:hidden">'
    + '<div id="pkgHint" style="display:flex;align-items:center;justify-content:flex-end;gap:5px;font-size:11px;color:var(--text-light);padding:5px 12px;background:var(--sand);border-bottom:1px solid var(--sand-dark);transition:opacity 0.3s">Slide for more <span style="display:inline-block;animation:pkgnudge 1.2s ease-in-out infinite">&#8250;&#8250;</span></div>'
    + '<div id="pkgScroll" onscroll="pkgScroll(this)" style="overflow-x:auto;-webkit-overflow-scrolling:touch">'
    + '<table style="width:100%;border-collapse:collapse;font-size:13px;min-width:520px;background:var(--white)">'
    + '<thead><tr style="background:#073B4C">'
    + '<th style="padding:.65rem .875rem;color:#fff;font-weight:500;font-size:12px;text-align:left;white-space:nowrap;position:sticky;left:0;z-index:3;background:#073B4C;min-width:130px;border-right:2px solid rgba(255,255,255,.2)">Meal Period</th>'
    + '<th style="padding:.65rem .875rem;color:#fff;font-weight:500;font-size:12px;text-align:left;white-space:nowrap">Time</th>'
    + '<th style="padding:.65rem .875rem;color:#fff;font-weight:500;font-size:12px;text-align:left">Description</th>'
    + '<th style="padding:.65rem .875rem;font-weight:600;font-size:12px;text-align:center;background:linear-gradient(135deg,#8a9099,#BCC2C8,#E2E6EA,#BCC2C8,#8a9099);color:#2a2a2a;min-width:60px">AI</th>'
    + '<th style="padding:.65rem .875rem;font-weight:600;font-size:12px;text-align:center;background:linear-gradient(135deg,#B8860B,#DAA520,#F0D060,#DAA520,#B8860B);color:#5a3d00;min-width:60px">UAI</th>'
    + '</tr></thead>'
    + '<tbody>' + tableRows + '</tbody>'
    + '</table></div></div>'
    + infoHtml;
}

function pkgScroll(el) { var hint = document.getElementById('pkgHint'); if (hint) hint.style.opacity = el.scrollLeft > 20 ? '0' : '1'; }
function renderActivities(rows) {
  return `<div class="sec-head">Daily Activities</div>
    <div class="act-timeline">
      ${rows.filter(r => r.Activity).map(r => `
        <div class="act-item">
          <div class="act-dot"></div>
          <div class="act-card">
            <div><div class="act-name">${r.Activity}</div><div class="act-loc">${r.Location || ''}</div></div>
            <span class="act-time-badge">${r.Time || ''}</span>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderEntertainment(rows) {
  return `<div class="sec-head">Nightly Entertainment</div>
    <div class="ent-card">
      ${rows.filter(r => r.Name).map(r => `
        <div class="ent-item">
          <div class="ent-emoji">${r.Icon || '🎵'}</div>
          <div>
            <div class="ent-name">${r.Name}</div>
            <div class="ent-detail">${r.Venue || ''}${r.Frequency ? ' · ' + r.Frequency : ''}</div>
          </div>
          <span class="ent-tag">${r.Time || ''}</span>
        </div>`).join('')}
    </div>`;
}

function renderResort(rows) {
  // Fill down empty Category/Icon cells (Google Sheets CSV leaves them blank)
  var lastCat = "", lastIcon = "";
  rows = rows.map(function(r) {
    if ((r["Category"] || "").trim() !== "") {
      lastCat  = r["Category"].trim();
      lastIcon = (r["Icon"] || "").trim();
    }
    return { Category: lastCat, Icon: lastIcon, Item: (r["Item"] || "").trim() };
  });
  var grouped = {}, order = [];
  rows.forEach(function(r) {
    if (!r.Category) return;
    if (!grouped[r.Category]) { grouped[r.Category] = { icon: r.Icon || "📍", items: [] }; order.push(r.Category); }
    if (r.Item) grouped[r.Category].items.push(r.Item);
  });
  var grid = "<div class=\"resort-grid\">" + order.map(function(cat) {
    var g = grouped[cat];
    return "<div class=\"resort-mini-card\"><div class=\"resort-mini-icon\">" + g.icon + "</div><div class=\"resort-mini-title\">" + cat + "</div><div class=\"resort-mini-list\">" + g.items.join("<br>") + "</div></div>";
  }).join("") + "</div>";
  var pdfUri = "Resort_Map.pdf";
  var mapSection = "<div class=\"sec-head\" style=\"margin-top:1.25rem\">Resort Map</div>"
    + "<div style=\"background:var(--white);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);overflow:hidden;margin-bottom:.875rem\">"
    + "<a href=\"" + pdfUri + "\" target=\"_blank\" download=\"CoveRotana_ResortMap.pdf\" style=\"display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;text-decoration:none;border-bottom:1px solid var(--sand-dark)\">"
    + "<div style=\"display:flex;align-items:center;gap:.75rem\">"
    + "<div style=\"width:42px;height:42px;border-radius:10px;background:#4DBDC6;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0\">🗺</div>"
    + "<div><div style=\"font-size:15px;font-weight:500;color:#0e5a92\">Resort Map PDF</div>"
    + "<div style=\"font-size:12px;color:var(--text-mid);margin-top:2px\">Tap to open · pinch to zoom</div></div></div>"
    + "<div style=\"font-size:22px;color:#0e5a92\">&#8599;</div></a>"
    + "<div style=\"padding:.625rem;background:var(--sand)\">"
    + "<embed src=\"" + pdfUri + "\" type=\"application/pdf\" width=\"100%\" height=\"420\" style=\"border-radius:8px;display:block\" />"
    + "</div></div>";
  var contact = "<div class=\"contact-band\"><div class=\"dial-zero\">0</div>"
    + "<div><div class=\"contact-text-title\">Thank You for Choosing Us</div>"
    + "<div class=\"contact-text-sub\">Dial &ldquo;0&rdquo; to reach our Team for any assistance or enquiry.</div>"
    + "</div></div>";
  return "<div class=\"sec-head\">Resort Facilities</div>" + grid + mapSection + contact;
}

function renderMatches(rows) {
  var grouped = {}, stageOrder = [];
  rows.filter(function(r) { return (r['Match'] || '').trim(); }).forEach(function(r) {
    var stage = (r['Stage'] || 'Group Stage').trim();
    if (!grouped[stage]) { grouped[stage] = []; stageOrder.push(stage); }
    grouped[stage].push(r);
  });
  var html = '<div class="sec-head">Catch the Match</div>';
  stageOrder.forEach(function(stage) {
    html += '<div class="match-wrap"><div class="match-stage-head">' + stage + '</div>';
    grouped[stage].forEach(function(r) {
      html += '<div class="match-card">'
        + '<div class="match-number">' + (r['Match'] || '') + '</div>'
        + '<div class="match-teams">' + (r['Home Team'] || '') + '<span class="vs">vs</span>' + (r['Away Team'] || '') + '</div>'
        + '<div class="match-datetime"><div class="match-date">' + (r['Date'] || '') + '</div><div class="match-time">' + (r['Time'] || '') + '</div></div>'
        + '</div>';
    });
    html += '</div>';
  });
  return html;
}

function showLoading(id) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading…</div></div>';
}

function showError(id, msg) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = '<div class="error-box"><div class="error-title">Could not load data</div><div class="error-sub">' + msg + '</div></div>';
}

const renderers = {
  dining: renderDining,
  offers: renderOffers,
  packages: renderPackages,
  activities: renderActivities,
  entertainment: renderEntertainment,
  resort: renderResort,
  matches: renderMatches
};

async function loadSection(key) {
  const el = document.getElementById(key);
  if (!el) return;
  showLoading(key);
  try {
    const rows = await fetchSheet(SHEET_TABS[key]);
    console.log('[DEBUG ' + key + '] rows:', rows.length, JSON.stringify(rows[0] || {}));
    const html = renderers[key](rows);
    console.log('[DEBUG ' + key + '] html length:', html.length);
    el.innerHTML = html;
  } catch(e) {
    console.error('[DEBUG ' + key + '] ERROR:', e.message);
    showError(key, 'Error loading ' + key + ': ' + e.message);
  }
}

Object.keys(SHEET_TABS).forEach(key => loadSection(key));

// Apply Config settings: labels, icons, visibility only (never moves DOM elements)
(async function applyConfig() {
  try {
    const cr = await fetchSheet('Config');
    if (!cr.length) return;

    const tabs    = document.querySelectorAll('.tab');
    const navBtns = document.querySelectorAll('.nav-btn');

    cr.forEach(function(r, i) {
      const key     = (r['Tab Key'] || '').trim();
      const label   = (r['Display Label'] || '').trim();
      const icon    = (r['Icon'] || '').trim();
      const navLbl  = (r['Nav Label'] || '').trim();
      const visible = (r['Visible'] || 'Yes').trim().toUpperCase();

      // Find matching tab button by its onclick
      tabs.forEach(function(btn) {
        const m = btn.getAttribute('onclick').match(/show\('([^']+)'/);
        if (!m || m[1] !== key) return;
        if (visible === 'NO') {
          btn.style.display = 'none';
        } else {
          btn.style.display = '';
          if (icon || label) btn.textContent = (icon ? icon + ' ' : '') + (label || btn.textContent.replace(/^.\s/, ''));
        }
      });

      // Find matching nav button
      navBtns.forEach(function(btn) {
        const m = btn.getAttribute('onclick').match(/show\('([^']+)'/);
        if (!m || m[1] !== key) return;
        if (visible === 'NO') {
          btn.style.display = 'none';
        } else {
          btn.style.display = '';
          if (icon) btn.querySelector('.nav-icon').textContent = icon;
          if (navLbl) btn.querySelector('.nav-label').textContent = navLbl;
        }
      });
    });
  } catch(e) {
    // Config sheet not available - keep defaults
  }
})();
</script>
